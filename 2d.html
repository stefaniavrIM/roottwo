<style>
:root {
  --bg:#fcfbff; --bg-raised:#f7f2ff; --card:#ffffff; --text:#1f1633; --text-dim:#5c4f78;
  --accent:#7c3aed; --accent-light:#8b5cf6; --border:#e9defc; --border-light:#d8c7fb;
  --shadow:0 18px 45px rgba(124,58,237,.10); --font:'Poppins',sans-serif; --display:'Bebas Neue',sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:linear-gradient(180deg,#fcfbff 0%,#f6f1ff 100%);color:var(--text);line-height:1.6}
a{color:inherit}

/* NAV */
nav{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 3rem;background:rgba(252,251,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none}
.nav-logo img{width:42px;height:42px;object-fit:contain}
.nav-logo-text{font-family:var(--display);font-size:1.3rem;letter-spacing:.04em;color:var(--text)}
.nav-links{list-style:none;display:flex;gap:2rem;align-items:center}
.nav-links a{text-decoration:none;font-size:.85rem;font-weight:500;color:var(--text-dim);transition:color .25s}
.nav-links a:hover{color:var(--accent)}

/* HERO */
.hero{padding:5rem 6vw 2rem;text-align:center}
.hero h1{font-family:var(--display);font-size:clamp(3rem,8vw,6rem);letter-spacing:.06em;color:var(--text);line-height:1}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* BACK ROW */
.back-row{padding:0 6vw .5rem}
.back-link{display:inline-block;font-size:.85rem;font-weight:500;color:var(--accent);text-decoration:none;transition:opacity .2s}
.back-link:hover{opacity:.7}

/* PORTFOLIO CONTACT */
.portfolio-contact{padding:0 6vw 1.5rem}
.btn-contact{display:inline-block;padding:.65rem 2rem;border-radius:100px;background:var(--accent);color:#fff;text-decoration:none;font-size:.85rem;font-weight:600;letter-spacing:.02em;transition:background .25s,transform .25s}
.btn-contact:hover{background:var(--accent-light);transform:translateY(-2px)}

/* FILTERS */
.filters{padding:0 6vw 2rem;display:flex;flex-wrap:wrap;gap:.6rem}
.filter-btn{border:1px solid var(--border);background:var(--card);color:var(--text-dim);font-family:var(--font);font-size:.8rem;font-weight:500;padding:.5rem 1.4rem;border-radius:100px;cursor:pointer;transition:all .25s var(--ease)}
.filter-btn:hover{border-color:var(--accent);color:var(--accent)}
.filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 24px rgba(124,58,237,.25)}

/* MAIN */
.main{padding:0 6vw 5rem}
.hidden{display:none!important}

/* CATEGORY DIVIDERS */
.cat-divider{display:flex;align-items:center;gap:1.25rem;margin:3rem 0 2rem;opacity:.7}
.cat-divider:first-child{margin-top:0}
.cat-divider span{font-family:var(--display);font-size:1.4rem;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);white-space:nowrap}
.cat-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* PROJECT LINE — all images for one project on the same row */
.project-line{display:flex;gap:1rem;margin-bottom:1.5rem;align-items:flex-start}
.project-line .img-card{flex:1;min-width:0;border-radius:20px;overflow:hidden;cursor:pointer;background:transparent;border:none;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.project-line .img-card:hover{transform:translateY(-4px);box-shadow:0 24px 50px rgba(124,58,237,.14)}
.project-line .img-card img{display:block;width:100%;height:auto;border-radius:20px}
/* Hero image gets more space */
.project-line .img-card.hero{flex:1.6}

/* SINGLES ROW */
.singles-row{display:flex;gap:1rem;margin-bottom:1.5rem;align-items:flex-start}
.singles-row .img-card{flex:1;max-width:380px;border-radius:20px;overflow:hidden;cursor:pointer;background:transparent;border:none;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.singles-row .img-card:hover{transform:translateY(-4px);box-shadow:0 24px 50px rgba(124,58,237,.14)}
.singles-row .img-card img{display:block;width:100%;height:auto;border-radius:20px}

/* SKETCHES GRID */
.sketches-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.sketch-card{border-radius:20px;overflow:hidden;cursor:pointer;background:transparent;border:none;box-shadow:var(--shadow);transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.sketch-card:hover{transform:translateY(-4px);box-shadow:0 24px 50px rgba(124,58,237,.14)}
.sketch-card img{display:block;width:100%;height:auto;border-radius:20px}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s var(--ease)}
.lightbox.open{opacity:1;pointer-events:auto}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:12px;transform:scale(.95);transition:transform .35s var(--ease);box-shadow:0 30px 80px rgba(0,0,0,.5);object-fit:contain}
.lightbox.open img{transform:scale(1)}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:rgba(255,255,255,.5);font-size:2rem;cursor:pointer;width:48px;height:48px;display:flex;align-items:center;justify-content:center;transition:color .2s;z-index:10}
.lightbox-close:hover{color:#fff}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,color .2s;font-size:1.2rem;z-index:10}
.lb-nav:hover{background:rgba(255,255,255,.16);color:#fff}
.lb-prev{left:16px}
.lb-next{right:16px}

/* FOOTER */
footer{padding:3rem 6vw 4rem;border-top:none;background:rgba(255,255,255,.55)}
.footer-copy{max-width:760px;color:var(--text-dim)}

/* RESPONSIVE */
@media(max-width:1100px){
  .sketches-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){

  .singles-row .img-card{max-width:100%}
  .sketches-grid{grid-template-columns:1fr}
  .lb-nav{display:none}
}
</style>

<script>
// FILTERS
const sections = document.querySelectorAll('[data-category]');
const dividers = document.querySelectorAll('.cat-divider');
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    sections.forEach(s => {
      s.classList.toggle('hidden', f !== 'all' && s.dataset.category !== f);
    });
    dividers.forEach(d => {
      d.classList.toggle('hidden', f !== 'all');
    });
  });
});

// LIGHTBOX
const lb = document.getElementById('lightbox');
const lbImg = lb.querySelector('img');
const lbItems = [...document.querySelectorAll('[data-lb]')];
let visible = [], idx = 0;

function getVisible() {
  return lbItems.filter(el => {
    const sec = el.closest('[data-category]');
    return sec && !sec.classList.contains('hidden');
  });
}

function openLB(i) {
  visible = getVisible();
  idx = i;
  lbImg.src = visible[idx].querySelector('img').src;
  lbImg.alt = visible[idx].querySelector('img').alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLB() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

function navLB(d) {
  idx = (idx + d + visible.length) % visible.length;
  lbImg.src = visible[idx].querySelector('img').src;
  lbImg.alt = visible[idx].querySelector('img').alt;
}

lbItems.forEach(el => {
  el.addEventListener('click', () => {
    const vis = getVisible();
    const i = vis.indexOf(el);
    if (i !== -1) openLB(i);
  });
});

lb.querySelector('.lightbox-close').addEventListener('click', closeLB);
lb.querySelector('.lb-prev').addEventListener('click', e => { e.stopPropagation(); navLB(-1); });
lb.querySelector('.lb-next').addEventListener('click', e => { e.stopPropagation(); navLB(1); });
lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowLeft') navLB(-1);
  if (e.key === 'ArrowRight') navLB(1);
});
</script>
