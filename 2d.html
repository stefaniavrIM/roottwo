<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>

<style>
:root {
  --bg:#fcfbff; --bg-raised:#f7f2ff; --card:#ffffff; --text:#1f1633; --text-dim:#5c4f78;
  --accent:#7c3aed; --accent-light:#8b5cf6; --border:#e9defc; --border-light:#d8c7fb;
  --shadow:0 14px 35px rgba(124,58,237,.09); --font:'Poppins',sans-serif; --display:'Bebas Neue',sans-serif;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:linear-gradient(180deg,#fcfbff 0%,#f6f1ff 100%);color:var(--text);line-height:1.6}
a{color:inherit}

/* NAV */
nav{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 3rem;background:rgba(252,251,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none}
.nav-logo img{width:42px;height:42px;object-fit:contain}
.nav-logo-text{font-family:var(--display);font-size:1.5rem;letter-spacing:.08em;text-transform:uppercase}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{text-decoration:none;color:var(--text-dim);font-size:.85rem}
.nav-links a:hover{color:var(--accent)}

/* HERO */
.hero{padding:5rem 6vw 2.2rem}
.hero h1{font-family:var(--display);font-size:clamp(3rem,7vw,5.8rem);letter-spacing:.05em;line-height:.92;text-transform:uppercase}
.hero h1 span{display:inline-block;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-light));padding:.2rem .75rem .1rem;border-radius:16px;box-shadow:0 18px 40px rgba(124,58,237,.22)}
.back-row{padding:0 6vw 1rem}.back-link{display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--text-dim);font-weight:600}.back-link:hover{color:var(--accent)}
.portfolio-contact{padding:0 6vw 2rem}.portfolio-contact .btn-contact{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;text-decoration:none;font-weight:700;letter-spacing:.02em;padding:.9rem 1.2rem;border-radius:999px;box-shadow:0 18px 40px rgba(124,58,237,.22)}

/* FILTERS */
.filters{padding:0 6vw 2.5rem;display:flex;flex-wrap:wrap;gap:.6rem}
.filter-btn{appearance:none;border:1px solid var(--border-light);background:#fff;color:var(--text);padding:.6rem 1.1rem;border-radius:999px;font:500 .8rem var(--font);letter-spacing:.03em;cursor:pointer;transition:all .25s var(--ease)}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,58,237,.04)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 8px 24px rgba(124,58,237,.25)}

/* MAIN */
.main{padding:0 6vw 5rem;max-width:1400px;margin:0 auto}

/* PROJECT ROW: hero left, supporting stacked right */
.project-row{display:grid;grid-template-columns:1.6fr 1fr;gap:.75rem;margin-bottom:1.25rem;max-height:420px}
.project-row.solo{grid-template-columns:1fr}
.project-hero{border-radius:20px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s var(--ease);min-height:0}
.project-hero:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(124,58,237,.15)}
.project-hero img{display:block;width:100%;height:100%;object-fit:cover}
.project-support{display:flex;flex-direction:column;gap:.75rem;min-height:0}
.project-support-img{border-radius:16px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s var(--ease);flex:1;min-height:0}
.project-support-img:hover{transform:translateY(-2px);box-shadow:0 16px 38px rgba(124,58,237,.14)}
.project-support-img img{display:block;width:100%;height:100%;object-fit:cover}

/* SINGLES ROW: for single-image projects grouped together */
.singles-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.single-card{border-radius:20px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.single-card:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(124,58,237,.15)}
.single-card img{display:block;width:100%;height:auto}

/* SKETCHES GRID */
.sketches-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.sketch-card{border-radius:20px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:transform .3s var(--ease),box-shadow .3s var(--ease)}
.sketch-card:hover{transform:translateY(-2px);box-shadow:0 20px 45px rgba(124,58,237,.15)}
.sketch-card img{display:block;width:100%;height:auto}

.hidden{display:none!important}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:1000;background:rgba(15,10,30,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;cursor:zoom-out}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:6px;transform:scale(.95);transition:transform .35s var(--ease);box-shadow:0 30px 80px rgba(0,0,0,.5)}
.lightbox.open img{transform:scale(1)}
.lightbox-close{position:absolute;top:16px;right:20px;background:none;border:none;color:rgba(255,255,255,.5);font-size:2rem;cursor:pointer;width:48px;height:48px;display:flex;align-items:center;justify-content:center;transition:color .2s;z-index:10}
.lightbox-close:hover{color:#fff}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s,color .2s;font-size:1.2rem;z-index:10}
.lb-nav:hover{background:rgba(255,255,255,.16);color:#fff}
.lb-prev{left:16px}
.lb-next{right:16px}

footer{padding:3rem 6vw 4rem;border-top:none;background:rgba(255,255,255,.55)}
.footer-copy{max-width:760px;color:var(--text-dim)}

@media(max-width:1100px){
  .project-row{grid-template-columns:1.4fr 1fr;max-height:350px}
  .singles-row,.sketches-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:900px){

  .nav-links{gap:1rem;flex-wrap:wrap}
  .hero{padding:4rem 1.2rem 2rem}

  .project-hero img,.project-support-img img{height:auto;object-fit:contain}
  .singles-row,.sketches-grid{grid-template-columns:1fr}
  .lb-nav{display:none}
}
</style>

<script>
// FILTERS
const sections = document.querySelectorAll('[data-category]');
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    sections.forEach(s => {
      s.classList.toggle('hidden', f !== 'all' && s.dataset.category !== f);
    });
  });
});

// LIGHTBOX
const lb = document.getElementById('lightbox');
const lbImg = lb.querySelector('img');
const lbItems = [...document.querySelectorAll('[data-lb]')];
let visible = [], idx = 0;

function getVisible() {
  return lbItems.filter(el => {
    const sec = el.closest('[data-category]');
    return sec && !sec.classList.contains('hidden');
  });
}

function openLB(i) {
  visible = getVisible();
  idx = i;
  lbImg.src = visible[idx].querySelector('img').src;
  lbImg.alt = visible[idx].querySelector('img').alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
function navLB(d) {
  idx = (idx + d + visible.length) % visible.length;
  lbImg.src = visible[idx].querySelector('img').src;
  lbImg.alt = visible[idx].querySelector('img').alt;
}

lbItems.forEach(el => {
  el.addEventListener('click', () => {
    const vis = getVisible();
    const i = vis.indexOf(el);
    if (i !== -1) openLB(i);
  });
});

lb.querySelector('.lightbox-close').addEventListener('click', closeLB);
lb.querySelector('.lb-prev').addEventListener('click', e => { e.stopPropagation(); navLB(-1); });
lb.querySelector('.lb-next').addEventListener('click', e => { e.stopPropagation(); navLB(1); });
lb.addEventListener('click', e => { if (e.target === lb) closeLB(); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLB();
  if (e.key === 'ArrowLeft') navLB(-1);
  if (e.key === 'ArrowRight') navLB(1);
});
</script>
