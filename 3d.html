<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Root Two | 3D</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#fcfbff; --bg-raised:#f7f2ff; --card:#ffffff; --text:#1f1633; --text-dim:#5c4f78;
  --accent:#7c3aed; --accent-light:#8b5cf6; --border:#e9defc; --border-light:#d8c7fb;
  --shadow:0 18px 45px rgba(124,58,237,.10); --font:'Poppins',sans-serif; --display:'Bebas Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:linear-gradient(180deg,#fcfbff 0%,#f6f1ff 100%);color:var(--text);line-height:1.6}
a{color:inherit}
nav{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1.1rem 3rem;background:rgba(252,251,255,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:.75rem;text-decoration:none}
.nav-logo img{width:42px;height:42px;object-fit:contain}
.nav-logo-text{font-family:var(--display);font-size:1.5rem;letter-spacing:.08em;text-transform:uppercase}
.nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
.nav-links a{text-decoration:none;color:var(--text-dim);font-size:.85rem}
.nav-links a:hover{color:var(--accent)}
.hero{padding:5rem 6vw 2.2rem}
.hero h1{font-family:var(--display);font-size:clamp(3rem,7vw,5.8rem);letter-spacing:.05em;line-height:.92;text-transform:uppercase}
.hero h1 span{display:inline-block;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-light));padding:.2rem .75rem .1rem;border-radius:16px;box-shadow:0 18px 40px rgba(124,58,237,.22)}
.back-row{padding:0 6vw 1rem}.back-link{display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;color:var(--text-dim);font-weight:600}.back-link:hover{color:var(--accent)}
.portfolio-contact{padding:0 6vw 2rem}.portfolio-contact .btn-contact{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;text-decoration:none;font-weight:700;letter-spacing:.02em;padding:.9rem 1.2rem;border-radius:999px;box-shadow:0 18px 40px rgba(124,58,237,.22)}
.main{padding:0 6vw 5rem}
.gallery{column-count:3;column-gap:1rem}
.art-card{display:inline-block;width:100%;margin:0 0 1rem;background:var(--card);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);break-inside:avoid;page-break-inside:avoid}
.art-card img{display:block;width:100%;height:auto;background:#f3ecff}
.video-card{padding:0;background:var(--card)}
.video-wrap{position:relative;width:100%;padding-top:56.25%;background:#120a20}
.video-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
footer{padding:3rem 6vw 4rem;border-top:none;background:rgba(255,255,255,.55)}
.footer-copy{max-width:760px;color:var(--text-dim)}
@media (max-width: 1100px) { .gallery{column-count:2} }
@media (max-width: 900px) {
  nav{padding:1rem 1.2rem;gap:1rem;align-items:flex-start;flex-direction:column}
  .nav-links{gap:1rem;flex-wrap:wrap}
  .hero{padding:4rem 1.2rem 2rem}
  .portfolio-contact{padding:0 1.2rem 1.5rem}
  .main{padding:0 1.2rem 3rem}
  .gallery{column-count:1}
}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">
    <img alt="Root Two logo" src="assets/asset_001.png"/>
    <div class="nav-logo-text">Root Two</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html#services">Services</a></li>
    <li><a href="index.html#teaching">Learn</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#contact">Get in Touch</a></li>
  </ul>
</nav>
<section class="hero">
  <h1><span>3D &amp; Animation Portfolio</span></h1>
</section>
<section class="back-row">
  <a class="back-link" href="index.html">← Back to Home</a>
</section>
<section class="portfolio-contact">
  <a class="btn-contact" href="mailto:hello@roottwo.io">Contact Us</a>
</section>
<main class="main">
  <section class="gallery">
    <figure class="art-card"><img alt="3D cooler render" src="assets/asset_003.jpg"/></figure>
    <figure class="art-card"><img alt="3D arcade environment concept" src="assets/asset_021.jpg"/></figure>
    <figure class="art-card"><img alt="3D character render" src="assets/asset_022.png"/></figure>
    <figure class="art-card video-card"><div class="video-wrap"><iframe src="https://www.youtube.com/embed/DUwyOcqgP8U" title="3D video 1" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></figure>
    <figure class="art-card video-card"><div class="video-wrap"><iframe src="https://www.youtube.com/embed/8sbBzZhrUxA" title="3D video 2" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></figure>
    <figure class="art-card video-card"><div class="video-wrap"><iframe src="https://www.youtube.com/embed/IZqoeytI2x8" title="3D video 3" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></figure>
  </section>
</main>
<footer>
  <p class="footer-copy">A multidisciplinary game art and development studio. Art, code, and teaching, under one roof. By gamers for gamers.</p>
</footer>
</body>
</html>
